name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Typecheck, lint, unit tests, build
    runs-on: ubuntu-latest
    # Dummy but well-formed values so `vite build` (and the Supabase client it
    # initializes) doesn't choke on missing env when real secrets aren't
    # configured yet.
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    needs: quality
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  integration:
    name: RLS isolation test (live Supabase project)
    runs-on: ubuntu-latest
    needs: quality
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      # GitHub Actions doesn't allow referencing `secrets` in a job-level
      # `if:` (it's evaluated before secrets are in scope there, which fails
      # the whole workflow to parse) - so the skip-until-configured check has
      # to happen in the shell instead, once secrets are already available
      # as env vars.
      - name: Run RLS isolation test (skips until SUPABASE_SERVICE_ROLE_KEY is configured)
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY repo secret not set - skipping the live RLS integration test."
            exit 0
          fi
          npm run test:integration
