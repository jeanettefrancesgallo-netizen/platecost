name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Dummy but well-formed values so `vite build`/`vite dev` (and the Supabase
# client it initializes) don't choke on missing env when real secrets aren't
# configured yet — the smoke e2e test never reads real data, it just checks
# that the page renders.
env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

jobs:
  quality:
    name: Typecheck, lint, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  integration:
    name: RLS isolation test (live Supabase project)
    runs-on: ubuntu-latest
    needs: quality
    # Skips gracefully until SUPABASE_SERVICE_ROLE_KEY is added as a repo
    # secret — this test creates/deletes its own throwaway orgs against the
    # real project, so it needs the real keys, not the build-time placeholders.
    if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run test:integration
